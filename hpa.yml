apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: photo-deployment-hpa
  namespace: photostudio-ns
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: photostudio-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 5
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60   # ⏱ wait 60 sec before scaling down
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60 
    
